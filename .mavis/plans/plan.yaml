    verify_prompt: |
      Estás verificando la Fase 7 de Zero-Friction — la página de Calendario.
      Repo: /Users/ezequielmenor/Proyectos/zero-friction.

      Ejecuta los siguientes chequeos y reporta PASS / FAIL en cada uno con una línea de evidencia (ruta + línea o output).

      ## 1. Typecheck
      Corre `cd /Users/ezequielmenor/Proyectos/zero-friction && pnpm tsc --noEmit`. Debe exit 0. Si falla, pega las primeras 30 líneas de error.

      ## 2. Ruta API — `app/api/calendar/route.ts`
      - El archivo existe.
      - Exporta un async `GET`.
      - Llama a `cookies()` (await) y `verifySession` con `AUTH_COOKIE`. Devuelve 401 con `{ error: 'unauthenticated' }` si falla.
      - Llama a `prisma.note.findMany` con `where: { userId: session.userId }`.
      - `select` incluye exactamente: `id, title, content, status, isImportant, dueDate, createdAt, updatedAt, domain, tags`.
      - Devuelve el array JSON sin envoltura.
      - Header `Cache-Control: no-store` presente.

      ## 3. NavMenu — `components/NavMenu.tsx`
      - Importa `CalendarIcon` desde `@/components/icons`.
      - En el bloque Desktop Sidebar (`md:flex` nav), hay un `<NavItem href="/calendar" label="Calendario" isActive={pathname === '/calendar'} isDesktop>` con `children={<CalendarIcon size={16} />}` o similar, posicionado DESPUÉS del `<NavItem>` de "Today" y ANTES de los hubs.
      - En el bloque Mobile Bottom Bar (`md:hidden` nav), hay un `<NavItem>` equivalente con `size={20}`, en el mismo orden relativo.
      - "Today" sigue intacto (no fue removido ni movido).

      ## 4. Estructura de la página de Calendario — `app/(app)/calendar/page.tsx`
      - Existe.
      - `'use client'` arriba.
      - Default export es el componente de la página.
      - Importa `NotePanel` desde `@/components/NotePanel`.
      - Renderiza DOS `NotePanel` condicionales: uno con prop `note={selectedNote}` (view/edit) y otro con prop `draft={...}` (create).
      - Renderiza un sidebar "Tareas sin Fecha" / "Bandeja" que lista notas con `dueDate === null && status !== 'DONE'`.
      - Renderiza una cuadrícula de 7 columnas con cabeceras en español: Lunes, Martes, Miércoles, Jueves, Viernes, Sábado, Domingo.
      - Incluye un botón "Hoy" que resetea el mes visible al actual.
      - Incluye botones prev/next de mes.

      ## 5. Mapa de colores de dominio
      - La página define un mapa de colores por dominio.
      - ESPIRITUAL → `#A68966` (bronze).
      - Los otros 4 dominios tienen colores distintos y sobrios.
      - Las tags en la cuadrícula usan ese mapa (borde izquierdo, dot, o tinte).

      ## 6. Lógica de fechas
      - Las celdas incluyen días leading del mes anterior y trailing del mes siguiente, con un flag `inMonth` u opuesto.
      - La celda "hoy" tiene un highlight visible.
      - Una nota con `dueDate` en día X se renderiza en la celda X (comparación por YYYY-MM-DD, no por timestamp completo).
      - El sidebar de backlog muestra notas con `dueDate === null && status !== 'DONE'`.

      ## 7. Wiring
      - `onUpdate`, `onCreated`, `onDelete` en los `NotePanel` disparan un reload de `/api/calendar`.
      - Click en una tarea de la cuadrícula abre el panel view/edit.
      - Click en área vacía de una celda abre el panel create con la fecha de esa celda pre-rellenada (aunque el patch de `dueDate` se haga en un segundo round-trip con PATCH).
      - La función `load()` (o equivalente) existe y se llama al montar.

      ## 8. Responsive
      - En desktop la sidebar está al lado de la cuadrícula (grid de 2 columnas en md+).
      - En mobile la sidebar se apila debajo.
      - La cuadrícula no está limitada a `max-w-[720px]` (la página usa su propio `max-w-none` o grid de 2 columnas para escapar el layout padre). Si el grid está constreñido a 720px, FAIL.
      - No hay patrones obviously broken en mobile (tap targets < 32px, overflow horizontal, texto cortado).

      ## 9. Regresión
      - El componente `NavMenu` mantiene TODOS los items previos: Today, Espiritual, Personal, Aprendizaje, Proyectos, Registros, Mente, Ajustes. El nuevo "Calendario" se añade sin eliminar nada.
      - `app/(app)/page.tsx` (Today) sigue compilando.
      - `app/(app)/hubs/[domain]/*` sigue compilando.
      - `app/(app)/layout.tsx` no fue modificado.

      ## 10. Lint
      Corre `pnpm lint`. Si hay errores nuevos introducidos por este cambio, FAIL y lista los errores. Warnings pre-existentes están OK.

      ## Veredicto

      Termina con uno de:
      - **VERDICT: PASS** — todos los chequeos pasaron.
      - **VERDICT: FAIL** — lista los chequeos que fallaron con el detalle concreto que el producer necesita para corregir (archivo, línea, qué esperaba vs qué encontró).
    max_retries: 2
