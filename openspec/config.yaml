# OpenSpec Configuration — zero-friction
# Auto-generated by sdd-init on 2026-07-01

context: >
  Zero-Friction is a personal productivity web app ("Monograph") built
  with Next.js 16 App Router, TypeScript, Tailwind CSS v4, Prisma ORM
  on PostgreSQL (Supabase pooler), JWT auth, and an OpenAI-compatible
  LLM backend for semantic classification and note linking. The app
  organizes user data into 5 domains (Spiritual, Personal, Learning,
  Projects, Logs) with AI-powered cross-domain links and a minimal
  capture-first UX. Dark theme only.

